# AlgoJunction Backend — Nginx Reverse Proxy
#
# Copy to VM:
#   sudo cp server/nginx/algojunction.conf /etc/nginx/sites-available/algojunction
#   sudo ln -s /etc/nginx/sites-available/algojunction /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limit zone — added to /etc/nginx/nginx.conf http block:
#   limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;

server {
    server_name api.algojunction.sumansahoo.com;
    limit_req_status 429;

    location / {
        limit_req zone=global burst=20 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.algojunction.sumansahoo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.algojunction.sumansahoo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = api.algojunction.sumansahoo.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.algojunction.sumansahoo.com;
    return 404; # managed by Certbot


}
