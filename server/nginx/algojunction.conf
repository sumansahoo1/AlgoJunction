# AlgoJunction Backend — Nginx Reverse Proxy
#
# Copy to VM:
#   sudo cp server/nginx/algojunction.conf /etc/nginx/sites-available/algojunction
#   sudo ln -s /etc/nginx/sites-available/algojunction /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.algojunction.sumansahoo.com;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
